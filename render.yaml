services:
  - type: web
    name: patchwork-api
    runtime: node
    rootDir: server
    plan: free
    region: oregon
    buildCommand: npm ci --include=dev
    preDeployCommand: npm run db:migrate
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 20.19.0
      - key: NODE_ENV
        value: production
      - key: DEBUG_REQUESTS
        value: "false"
      - key: ACTION_LOGGING_ENABLED
        value: "true"
      - key: SUPABASE_BUCKET
        value: images
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: CLIENT_ORIGIN
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
